# ─────────────────────────────────────────────────────────────────────────────
# GST Reconciliation Platform — Application Configuration
# ─────────────────────────────────────────────────────────────────────────────

spring:
  application:
    name: gst-reconciliation

  # ── Datasource (PostgreSQL + PGVector) ──────────────────────────────────────
  datasource:
    url: jdbc:postgresql://localhost:5432/gst_recon
    username: gst_user
    password: gst_pass
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: GstHikariPool
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  # ── JPA / Hibernate ─────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate            # Flyway owns DDL; Hibernate only validates
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  # ── Flyway DB Migrations ─────────────────────────────────────────────────────
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ── Redis Cache ──────────────────────────────────────────────────────────────
  data:
    redis:
      host: localhost
      port: 6379
      password: redis_pass
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 3600000       # 1 hour default TTL (ms)
      cache-null-values: false

  # ── Multipart (invoice file uploads) ────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 50MB

  # ── Spring AI — Ollama ───────────────────────────────────────────────────────
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.2:1b       # lightweight 1B model; swap to llama3:8b for better quality
          temperature: 0.2
          top-p: 0.9
          num-ctx: 4096
      embedding:
        options:
          model: nomic-embed-text   # 768-dim free embedding model

    # PGVector vector store
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 768            # nomic-embed-text output dimensions
        initialize-schema: false   # Flyway handles table creation

# ─── Server ───────────────────────────────────────────────────────────────────
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always
  compression:
    enabled: true
    mime-types: application/json,text/html

# ─── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# ─── SpringDoc / Swagger ──────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    try-it-out-enabled: true

# ─── Application Custom Properties ────────────────────────────────────────────
app:
  jwt:
    secret: "gst-recon-jwt-secret-change-in-production-min-256-bits"
    expiration-ms: 86400000        # 24 hours
  reconciliation:
    similarity-threshold: 0.85     # cosine similarity cutoff for AI matching
    batch-size: 500                # invoices per reconciliation batch
    rag:
      top-k: 5                     # top-K vector search results
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:4200

---
# ─── Docker Profile (overrides for containerised environment) ─────────────────
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres:5432/gst_recon

  data:
    redis:
      host: redis

  ai:
    ollama:
      base-url: http://ollama:11434
